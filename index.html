<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>GeoAR.js demo</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="//cdn.rawgit.com/donmccurdy/aframe-physics-system/v4.0.1/dist/aframe-physics-system.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden">
    <a-scene embedded arjs="source:webcam;sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false;">
      <a-camera
        gps-camera="simulateLatitude:40.916738;simulateLongitude:38.324505"
        rotation-reader
      >

       <a-text
        value="DENİZZZZZZZZZZZZZ"
        scale="15 15 15 "
        look-at="[gps-camera]"
        align="center"
        gps-entity-place="latitude:40.917113;longitude:38.325014;"
      ></a-text>

        
      </a-camera>
      
    </a-scene>
  </body>
</html>
